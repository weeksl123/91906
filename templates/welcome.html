<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
</head>
<body>
    {% if session['logged_in'] %}
        <p>You are currently logged in as {{ session['username'] }}.</p>
        <a href="/logout">Log Out</a>
    {% else %}
        <p>You are not logged in.</p>
        <a href="{{ url_for('login') }}">Log In</a>
    {% endif %}
</body>
</html>
