{% extends 'base.html' %}

{% block title %}
    <title>Account</title>
{% endblock %}

{% block body %}
    <h1>Account</h1>
    <h2>Logged in as {{ session['username'] }}</h2>
    {% if session['user_status'] == 0 %}
        <h2>Admin</h2>
    {% else %}
        <h2>User</h2>
    {% endif %}

{% endblock %}
